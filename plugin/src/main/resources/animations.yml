# Definisci qui tutte le animazioni condivise tra tab.yml e scoreboard.yml.
# Usale nei file di config con il placeholder: %animation:NomeAnimazione%
#
# Formato:
#   NomeAnimazione:
#     change-interval: 200   # ms tra un frame e l'altro
#     texts:
#       - "&cFrame 1"
#       - "&aFrame 2"
# ============================================================

