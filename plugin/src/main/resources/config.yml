#
#  Sviluppato da Indifferenzah
#  Le azioni supportano:
#    [MESSAGE] [BROADCAST] [ACTIONBAR] [TITLE] [SOUND]
#    [COMMAND] [CONSOLE] [GAMEMODE] [EFFECT] [MENU] [CLOSE] [PROXY]
# ============================================================

# Prefisso del plugin nei messaggi
prefix: "&8[&bHubCore&8]&r"

# ============================================================
#  SPADA PVP
# ============================================================
sword:
  # Slot dell'inventario (0 = prima hotbar slot)
  slot: 0
  # Materiale della spada
  material: IRON_SWORD
  # Spada indistruttibile
  unbreakable: true
  # Incantesimi applicati (nome: livello)
  enchants:
    sharpness: 1
  # Flag ItemStack (es. HIDE_ATTRIBUTES, HIDE_ENCHANTS)
  flags:
    - HIDE_ATTRIBUTES
    - HIDE_ENCHANTS
    - HIDE_UNBREAKABLE

  # Aspetto quando il PvP è inattivo
  inactive:
    name: "&7Spada PvP &c[OFF]"
    lore:
      - "&8▸ &7Tieni in mano per &cattivare &7il PvP"
      - "&8▸ &7Stato: &cDisattivato"

  # Aspetto quando il PvP è attivo
  active:
    name: "&aSpada PvP &2[ON]"
    lore:
      - "&8▸ &7Riponi per &adisattivare &7il PvP"
      - "&8▸ &7Stato: &aAttivato"

# ============================================================
#  ARMATURA PVP
# ============================================================
armor:
  # Se abilitare l'armatura PvP automatica
  enabled: true

  helmet:
    material: IRON_HELMET
    name: "&7Casco PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true
    # color: "FF5500"  # Solo per materiali LEATHER_*, formato hex RGB (opzionale)

  chestplate:
    material: IRON_CHESTPLATE
    name: "&7Pettorale PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true

  leggings:
    material: IRON_LEGGINGS
    name: "&7Gambali PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true

  boots:
    material: IRON_BOOTS
    name: "&7Stivali PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true

# ============================================================
#  PVP
# ============================================================
pvp:
  # Delay di attivazione PvP in SECONDI
  delay-enable: 5
  # Delay di disattivazione PvP in SECONDI
  delay-disable: 5
  # Delay dopo il rispawn prima di poter attivare il PvP in SECONDI
  delay-respawn: 3
  # Durata del combat tag in SECONDI
  combat-tag-duration: 10
  # Durata massima del combattimento in SECONDI (0 = disabilitato)
  max-combat-duration: 0
  # Se il danno subito annulla il delay di attivazione
  cancel-on-damage: true

  # Actionbar durante il delay di attivazione
  actionbar:
    enabled: true
    format: "&eAttivazione PvP in &a{seconds}s&e..."

  # Guarigione al kill
  kill-heal:
    enabled: true
    # FULL = guarigione completa, REGENERATION = effetto rigenerazione
    type: FULL
    regen-amplifier: 1
    regen-duration: 100

  # Milestone killstreak
  killstreak-milestones:
    3:
      message: "&c{player} &7ha una killstreak di &c{killstreak}&7!"
      broadcast: false
      sound: ENTITY_PLAYER_LEVELUP
      pitch: 1.2
      volume: 1.0
    5:
      message: "&6{player} &7e' in &6RAMPAGE &7(&c{killstreak} kill&7)!"
      broadcast: true
      sound: ENTITY_PLAYER_LEVELUP
      pitch: 1.5
      volume: 1.0
    10:
      message: "&4{player} &7e' &4INARRESTABILE &7(&c{killstreak} kill&7)!"
      broadcast: true
      sound: ENTITY_WITHER_SPAWN
      pitch: 1.0
      volume: 1.0

  # Kill feed
  kill-feed:
    enabled: true
    # CHAT, ACTION_BAR, BOSSBAR
    target: CHAT
    format: "&8[&cKill&8] &c{killer} &7ha eliminato &c{victim}&7."

  # Effetti all'uccisione
  on-kill:
    particles:
      enabled: true
      type: CRIT
      count: 20
      offset-x: 0.5
      offset-y: 1.0
      offset-z: 0.5
    sound:
      enabled: true
      type: ENTITY_PLAYER_LEVELUP
      volume: 1.0
      pitch: 1.0
      # KILLER, VICTIM, BOTH, BROADCAST_RADIUS
      target: KILLER
      radius: 30.0

  # Suono all'attivazione del PvP
  on-enable:
    sound:
      enabled: true
      type: BLOCK_NOTE_BLOCK_PLING
      volume: 1.0
      pitch: 1.2

  # Suono alla disattivazione del PvP
  on-disable:
    sound:
      enabled: true
      type: BLOCK_NOTE_BLOCK_BASS
      volume: 1.0
      pitch: 0.8

# ============================================================
#  DATABASE
# ============================================================
database:
  # Nome del file H2 (senza estensione, relativo alla cartella del plugin)
  file: "hubcore_data"
  # Intervallo di salvataggio automatico in SECONDI (300 = 5 minuti)
  save-interval: 300

# ============================================================
#  LOBBY BLOCKS
# ============================================================
lobby-blocks:
  enabled: true

  # Slot dello stack di blocchi (item che sembra un normale blocco)
  block-slot: 2
  # Slot dell'item selettore
  selector-slot: 6
  # Blocco di default allo spawn
  default-block: PURPLE_WOOL

  # Nome dell'item blocco nell'hotbar — {block} viene sostituito con il nome del blocco
  block-name: "&bBlocchi"

  # Durata in secondi della rottura del blocco
  break-time: 5

  # Blocchi non piazzabili con il sistema
  blacklist:
    - BEDROCK
    - BARRIER
    - WATER
    - LAVA
    - AIR
    - VOID_AIR
    - CAVE_AIR

  # Item selettore (apre il menu blockselector.yml)
  selector:
    material: REPEATER
    name: "&bSelettore Blocchi"
#    lore:
    unbreakable: true
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE

# ============================================================
#  LAUNCHPAD
# ============================================================
launchpad:
  enabled: true
  launch_power: 5.0
  launch_power_y: 1.5
  top_block: LIGHT_WEIGHTED_PRESSURE_PLATE
  bottom_block: POLISHED_DIORITE
  actions:
    - '[SOUND] ENTITY_BAT_TAKEOFF'

# ============================================================
#  DOUBLE JUMP
# ============================================================
double_jump:
  enabled: true
  launch_power: 1.0
  launch_power_y: 0.9
  cooldown: 3
  actions:
    - '[SOUND] ENTITY_BAT_TAKEOFF'
# ============================================================
#  WORLD SETTINGS
# ============================================================
world_settings:
  disable_hunger_loss: true
  disable_fall_damage: true
  disable_player_pvp: true
  disable_void_death: true
  disable_fire_damage: true
  disable_drowning: true
  disable_off_hand_swap: true
  disable_weather_change: true
  disable_death_message: true
  disable_mob_spawning: true
  disable_item_drop: true
  disable_item_pickup: true
  disable_block_break: true
  disable_block_place: true
  disable_block_interact: true
  disable_block_burn: true
  disable_block_fire_spread: true
  disable_block_leaf_decay: true

# ============================================================
#  JOIN / LEAVE MESSAGES
#  Se il giocatore ha hubcore.announce.join/.leave
#  il messaggio viene mostrato a tutti, altrimenti è nascosto.
# ============================================================
join_leave_messages:
  enabled: true
  join_message: "&8[&a+&8] &7%player%"
  quit_message: "&8[&c-&8] &7%player%"

# ============================================================
#  JOIN EVENTS  (eseguiti a ogni join)
#  [TITLE] testo;sottotitolo;fadeIn;stay;fadeOut  (secondi)
#  [SOUND] NOME_SUONO
#  [GAMEMODE] survival|creative|adventure|spectator
#  [EFFECT] NOME_EFFETTO;amplificatore
# ============================================================
join_events:
  - "[TITLE] &#9c3ae4&lʙᴇɴᴠᴇɴᴜᴛᴏ;&#e0b3ff%player%;1;2;1"
  - "[SOUND] ENTITY_PLAYER_LEVELUP"
  - "[GAMEMODE] survival"
  - "[EFFECT] SPEED;1"

# ============================================================
#  JOIN SETTINGS
# ============================================================
join_settings:
  spawn_join: true
  heal: true
  extinguish: true
  clear_inventory: true
  firework:
    enabled: true
    first_join_only: true
    type: BALL_LARGE
    power: 1
    flicker: true
    trail: true
    colors:
      - AQUA
      - RED
      - TEAL
      - WHITE

# ============================================================
#  ANTI WORLD DOWNLOADER
# ============================================================
anti_wdl:
  enabled: true
  notify_admins: true

# ============================================================
#  CUSTOM JOIN ITEMS
#  Item extra consegnati al join. Le azioni supportano:
#  [MESSAGE] [BROADCAST] [ACTIONBAR] [TITLE] [SOUND]
#  [COMMAND] [CONSOLE] [GAMEMODE] [EFFECT] [MENU] [CLOSE] [PROXY]
# ============================================================
custom_join_items:
  enabled: true
  # Impedisce di spostare/droppare gli item
  disable_inventory_movement: true
  items:
    server_selector:
      material: COMPASS
      amount: 1
      slot: 4
      display_name: "&eꜱᴇʟᴇᴢɪᴏɴᴇ ꜱᴇʀᴠᴇʀ"
      lore:
        - "&#d4b8ffᴛᴀꜱᴛᴏ ᴅᴇꜱᴛʀᴏ ᴘᴇʀ ᴀᴘʀɪʀᴇ!"
      actions:
        - "[MENU] serverselector"

# ============================================================
#  PLAYER HIDER
# ============================================================
player_hider:
  enabled: true
  slot: 8
  disable_inventory_movement: true
  # Secondi di cooldown tra un toggle e l'altro
  cooldown: 3
  not_hidden:
    material: PURPLE_DYE
    amount: 1
    display_name: '&#9c3ae4ɢɪᴏᴄᴀᴛᴏʀɪ ᴀʙɪʟɪᴛᴀᴛɪ &#d4b8ff(ᴛᴀꜱᴛᴏ ᴅᴇꜱᴛʀᴏ)'
    lore:
      - '&#d4b8ffᴄʟɪᴄᴄᴀ ᴘᴇʀ &#a64dffɴᴀꜱᴄᴏɴᴅᴇʀᴇ &#d4b8ffᴛᴜᴛᴛɪ ɪ ɢɪᴏᴄᴀᴛᴏʀɪ!'
  hidden:
    material: RED_DYE
    amount: 1
    display_name: '&4ɢɪᴏᴄᴀᴛᴏʀɪ ᴅɪꜱᴀʙɪʟɪᴛᴀᴛɪ &#d4b8ff(ᴛᴀꜱᴛᴏ ᴅᴇꜱᴛʀᴏ)'
    lore:
      - '&#d4b8ffᴄʟɪᴄᴄᴀ ᴘᴇʀ &#9c3ae4ᴠᴇᴅᴇʀᴇ &#d4b8ffᴛᴜᴛᴛɪ ɪ ɢɪᴏᴄᴀᴛᴏʀɪ!'
