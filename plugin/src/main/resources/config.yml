# ============================================================
#  HubCore - Configurazione principale
#  Sviluppato da Indifferenzah
# ============================================================

# Prefisso del plugin nei messaggi
prefix: "&8[&bHubCore&8]&r"

# ============================================================
#  SPADA PVP
# ============================================================
sword:
  # Slot dell'inventario (0 = prima hotbar slot)
  slot: 0
  # Materiale della spada
  material: IRON_SWORD
  # Spada indistruttibile
  unbreakable: true
  # Incantesimi applicati (nome: livello)
  enchants:
    sharpness: 1
  # Flag ItemStack (es. HIDE_ATTRIBUTES, HIDE_ENCHANTS)
  flags:
    - HIDE_ATTRIBUTES
    - HIDE_ENCHANTS

  # Aspetto quando il PvP e' inattivo
  inactive:
    name: "&7Spada PvP &c[OFF]"
    lore:
      - "&8▸ &7Tieni in mano per &cattivare &7il PvP"
      - "&8▸ &7Stato: &cDisattivato"

  # Aspetto quando il PvP e' attivo
  active:
    name: "&aSpada PvP &2[ON]"
    lore:
      - "&8▸ &7Riponi per &adisattivare &7il PvP"
      - "&8▸ &7Stato: &aAttivato"

# ============================================================
#  ARMATURA PVP
# ============================================================
armor:
  # Se abilitare l'armatura PvP automatica
  enabled: true

  helmet:
    material: IRON_HELMET
    name: "&7Casco PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true
    # color: "FF5500"  # Solo per materiali LEATHER_*, formato hex RGB (opzionale)

  chestplate:
    material: IRON_CHESTPLATE
    name: "&7Pettorale PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true

  leggings:
    material: IRON_LEGGINGS
    name: "&7Gambali PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true

  boots:
    material: IRON_BOOTS
    name: "&7Stivali PvP"
    lore: []
    enchants:
      protection: 1
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
    unbreakable: true

# ============================================================
#  PVP
# ============================================================
pvp:
  # Delay di attivazione PvP in SECONDI
  delay-enable: 5
  # Delay di disattivazione PvP in SECONDI
  delay-disable: 5
  # Delay dopo il rispawn prima di poter attivare il PvP in SECONDI
  delay-respawn: 3
  # Durata del combat tag in SECONDI
  combat-tag-duration: 10
  # Durata massima del combattimento in SECONDI (0 = disabilitato)
  max-combat-duration: 0
  # Se il danno subito annulla il delay di attivazione
  cancel-on-damage: true

  # Actionbar durante il delay di attivazione
  actionbar:
    enabled: true
    format: "&eAttivazione PvP in &a{seconds}s&e..."

  # Guarigione al kill
  kill-heal:
    enabled: true
    # FULL = guarigione completa, REGENERATION = effetto rigenerazione
    type: FULL
    regen-amplifier: 1
    regen-duration: 100

  # Milestone killstreak
  killstreak-milestones:
    3:
      message: "&c{player} &7ha una killstreak di &c{killstreak}&7!"
      broadcast: false
      sound: ENTITY_PLAYER_LEVELUP
      pitch: 1.2
      volume: 1.0
    5:
      message: "&6{player} &7e' in &6RAMPAGE &7(&c{killstreak} kill&7)!"
      broadcast: true
      sound: ENTITY_PLAYER_LEVELUP
      pitch: 1.5
      volume: 1.0
    10:
      message: "&4{player} &7e' &4INARRESTABILE &7(&c{killstreak} kill&7)!"
      broadcast: true
      sound: ENTITY_WITHER_SPAWN
      pitch: 1.0
      volume: 1.0

  # Kill feed
  kill-feed:
    enabled: true
    # CHAT, ACTION_BAR, BOSSBAR
    target: CHAT
    format: "&8[&cKill&8] &c{killer} &7ha eliminato &c{victim}&7."

  # Effetti all'uccisione
  on-kill:
    particles:
      enabled: true
      type: CRIT
      count: 20
      offset-x: 0.5
      offset-y: 1.0
      offset-z: 0.5
    sound:
      enabled: true
      type: ENTITY_PLAYER_LEVELUP
      volume: 1.0
      pitch: 1.0
      # KILLER, VICTIM, BOTH, BROADCAST_RADIUS
      target: KILLER
      radius: 30.0

  # Suono all'attivazione del PvP
  on-enable:
    sound:
      enabled: true
      type: BLOCK_NOTE_BLOCK_PLING
      volume: 1.0
      pitch: 1.2

  # Suono alla disattivazione del PvP
  on-disable:
    sound:
      enabled: true
      type: BLOCK_NOTE_BLOCK_BASS
      volume: 1.0
      pitch: 0.8

# ============================================================
#  DATABASE
# ============================================================
database:
  # Nome del file H2 (senza estensione, relativo alla cartella del plugin)
  file: "hubcore_data"
  # Intervallo di salvataggio automatico in SECONDI (300 = 5 minuti)
  save-interval: 300
